<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — ShopEase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { width: 100%; max-width: 420px; padding: 40px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-control-auth { border: 1.5px solid #eee; border-radius: 12px; padding: 12px 16px; transition: all 0.25s; }
        .form-control-auth:focus { border-color: #2ecc71; box-shadow: 0 0 0 3px rgba(46,204,113,0.1); outline: none; }
        .btn-auth { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: #fff; border: none; border-radius: 12px; padding: 12px; font-weight: 700; box-shadow: 0 4px 15px rgba(46,204,113,0.3); }
        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(46,204,113,0.4); color: #fff; }
        
        /* Dark Mode Styling */
        [data-theme="dark"] body { background: #0f172a; }
        [data-theme="dark"] .auth-card { background: #1e293b; color: #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        [data-theme="dark"] .form-control-auth { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); color: #ffffff; }
        [data-theme="dark"] .text-dark { color: #f1f5f9 !important; }
        [data-theme="dark"] .text-muted { color: #94a3b8 !important; }
        [data-theme="dark"] .form-control-auth::placeholder { color: #64748b !important; }

        /* Theme-aware Logos */
        [data-theme="light"] .logo-dark-mode { display: none !important; }
        [data-theme="dark"] .logo-light-mode { display: none !important; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <img th:src="@{/img/Dark_Theme_Logo.png}" alt="Logo" class="logo-light-mode" style="height: 45px;">
            <img th:src="@{/img/Light_Theme_Logo.png}" alt="Logo" class="logo-dark-mode" style="height: 45px;">
        </div>
        <h3 class="fw-bold mb-1">Forgot Password?</h3>
        <p class="text-muted small mb-4">No worries! Enter your email and we'll send you a link to reset your password.</p>

        <div th:if="${errorMsg}" class="alert alert-danger rounded-3 border-0 small py-2 mb-3">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        </div>

        <form th:action="@{/forgot_password}" method="post">
            <div class="mb-4">
                <label class="form-label fw-semibold small text-dark">Email Address</label>
                <div class="position-relative">
                    <i class="fas fa-envelope position-absolute text-muted" style="left: 15px; top: 50%; transform: translateY(-50%);"></i>
                    <input type="email" name="email" class="form-control form-control-auth" style="padding-left: 40px;" placeholder="you@example.com" required>
                </div>
            </div>
            <button type="submit" class="btn btn-auth w-100">Send Reset Link</button>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/login}" class="text-muted small text-decoration-none fw-bold"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
        </div>
    </div>
</body>
</html>
