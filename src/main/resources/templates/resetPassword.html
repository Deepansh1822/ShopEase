<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — ShopEase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { width: 100%; max-width: 420px; padding: 40px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-control-auth { border: 1.5px solid #eee; border-radius: 12px; padding: 12px 16px; transition: all 0.25s; }
        .form-control-auth:focus { border-color: #2ecc71; box-shadow: 0 0 0 3px rgba(46,204,113,0.1); outline: none; }
        .btn-auth { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: #fff; border: none; border-radius: 12px; padding: 12px; font-weight: 700; box-shadow: 0 4px 15px rgba(46,204,113,0.3); }
        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(46,204,113,0.4); color: #fff; }
        .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #bbb; cursor: pointer; }
        
        /* Theme-aware Logos */
        [data-theme="light"] .logo-dark-mode { display: none !important; }
        [data-theme="dark"] .logo-light-mode { display: none !important; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <img th:src="@{/img/Light_Theme_Logo.png}" alt="Logo" style="height: 45px;">
        </div>
        <h3 class="fw-bold mb-1">Reset Password</h3>
        <p class="text-muted small mb-4">Almost there! Choose a strong new password to secure your account.</p>

        <form th:action="@{/reset_password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            
            <div class="mb-4">
                <label class="form-label fw-semibold small text-dark">New Password</label>
                <div class="position-relative">
                    <i class="fas fa-lock position-absolute text-muted" style="left: 15px; top: 50%; transform: translateY(-50%);"></i>
                    <input type="password" name="password" id="password" class="form-control form-control-auth" 
                           style="padding-left: 40px; padding-right: 40px;" placeholder="••••••••" required minlength="8">
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
            </div>
            
            <button type="submit" class="btn btn-auth w-100">Set New Password</button>
        </form>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
