<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
    <nav th:replace="~{layout :: nav}"></nav>
    <div class="content-wrapper bg-light pt-0">
        <!-- Shop Hero -->
        <section class="py-5 bg-dark text-white text-center position-relative overflow-hidden"
            style="background: linear-gradient(135deg, #111 0%, #000 100%);">
            <div class="container py-5 z-1 position-relative">
                <span class="badge bg-accent text-white rounded-pill px-3 py-2 mb-3 fw-bold text-uppercase tracking-wider">The Shop</span>
                <h1 class="display-3 fw-bold mb-4">Discover Quality</h1>
                <p class="lead text-white-50 mx-auto" style="max-width: 600px;">Explore our curated collection of premium products. Quality materials meets state-of-the-art design.</p>
            </div>
            <!-- Decorative blobs -->
            <div class="position-absolute rounded-circle bg-primary opacity-20" 
                style="width: 400px; height: 400px; bottom: -100px; left: -100px; filter: blur(70px);"></div>
            <div class="position-absolute rounded-circle bg-accent opacity-15" 
                style="width: 300px; height: 300px; top: -50px; right: -50px; filter: blur(50px);"></div>
        </section>

        <div class="container py-5 mt-5">

            <div class="row">
                <!-- Filters Sidebar -->
                <div class="col-lg-3 mb-4 mb-lg-0">
                    <div class="card border-0 shadow-sm rounded-4 p-4 sticky-top" style="top: 100px; z-index: 900;">
                        <h5 class="fw-bold mb-4"><i class="fas fa-filter text-accent me-2"></i>Filters</h5>
                        
                        <!-- Search Box -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Search</label>
                            <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
                        </div>

                        <!-- Category Filter -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Category</label>
                            <div class="d-flex flex-column gap-2" id="categoryFilter">
                                <div class="form-check">
                                    <input class="form-check-input filter-category" type="radio" name="cat" id="cat_all" value="all" checked>
                                    <label class="form-check-label" for="cat_all">All Categories</label>
                                </div>
                                <div class="form-check" th:each="category : ${categories}">
                                    <input class="form-check-input filter-category" type="radio" name="cat" th:id="'cat_' + ${category.id}" th:value="${category.id}">
                                    <label class="form-check-label" th:for="'cat_' + ${category.id}" th:text="${category.name}">Category</label>
                                </div>
                            </div>
                        </div>

                        <!-- Brand Filter (Populated via JS) -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Brands</label>
                            <div id="brandFilterContainer" class="d-flex flex-column gap-2" style="max-height: 200px; overflow-y: auto;">
                                <!-- Dynamic checkboxes injected here -->
                            </div>
                        </div>

                        <!-- Price Range -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Max Price: <span id="priceVal" class="text-dark">Rs. 100000</span></label>
                            <input type="range" class="form-range" id="priceRange" min="0" max="100000" step="500" value="100000">
                        </div>
                        
                        <!-- Sort By -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Sort By</label>
                            <select id="sortSelect" class="form-select">
                                <option value="default">Default</option>
                                <option value="price_asc">Price: Low to High</option>
                                <option value="price_desc">Price: High to Low</option>
                                <option value="name_asc">Name: A to Z</option>
                            </select>
                        </div>

                        <button id="resetFilters" class="btn btn-outline-danger w-100 rounded-pill"><i class="fas fa-redo me-2"></i>Reset Filters</button>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="col-lg-9">
                    <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm">
                        <h4 class="fw-bold m-0 text-dark">Results</h4>
                        <span class="badge bg-dark rounded-pill py-2 px-3" id="items-found-count" th:text="${products.size()} + ' Items found'">0 Items</span>
                    </div>
                    
                    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="productsGrid">
                        <div class="col product-card-col" 
                             th:data-category-id="${product.category.id}" 
                             th:data-brand="${product.brand != null ? product.brand : 'Other'}"
                             th:data-price="${product.price}"
                             th:data-name="${#strings.toLowerCase(product.name)}"
                             th:each="product : ${products}" 
                             style="transition: all 0.3s ease;">
                             
                            <div class="card h-100 shadow-sm border-0 rounded-4">
                                <div class="position-relative overflow-hidden rounded-top-4" style="height: 230px;">
                                    <!-- Wishlist Heart -->
                                    <a th:href="@{/wishlist/add/{id}(id=${product.id}, redirect='/shop')}" class="btn btn-white btn-sm rounded-circle shadow-sm position-absolute" style="top: 10px; right: 10px; z-index: 10; width: 32px; height: 32px; padding: 0; line-height: 30px; border: 1px solid rgba(0,0,0,0.05);">
                                        <i class="text-danger" th:classappend="${wishlistProductIds != null && wishlistProductIds.contains(product.id)} ? 'fas fa-heart' : 'far fa-heart'"></i>
                                    </a>
                                    <a th:href="@{/shop/viewproduct/{id}(id=${product.id})}">
                                        <img th:src="@{'/img/' + ${product.imageName}}" 
                                             class="card-img-top h-100 w-100 object-fit-cover transition-scale" 
                                             alt="Product">
                                    </a>
                                </div>
                                <div class="card-body d-flex flex-column">
                                    <div class="d-flex justify-content-between mb-1">
                                        <small class="text-accent fw-bold text-uppercase" th:text="${product.category.name}">Category</small>
                                        <small class="text-muted fw-bold" th:text="${product.brand != null ? product.brand : ''}">Brand</small>
                                    </div>
                                    <a th:href="@{/shop/viewproduct/{id}(id=${product.id})}" class="text-decoration-none">
                                        <h5 class="card-title fw-bold text-dark mt-1" th:text="${product.name}">Product Name</h5>
                                    </a>
                                    <p class="card-text text-muted small flex-grow-1" th:text="${product.description}">Description</p>
                                    <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                                        <span class="h5 fw-bold mb-0 text-dark" th:text="'Rs. ' + ${product.price}">Price</span>
                                        <a th:href="@{/addToCart/{id}(id=${product.id})}" class="btn btn-outline-primary rounded-pill btn-sm px-4">
                                            <i class="fas fa-plus me-1"></i> Add
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="noResultsMsg" class="text-center py-5 d-none bg-white rounded-4 shadow-sm mt-4">
                        <i class="fas fa-search fa-4x text-muted mb-3 opacity-25"></i>
                        <h4 class="text-muted">No products match your filters</h4>
                        <button class="btn btn-primary mt-3 rounded-pill" onclick="document.getElementById('resetFilters').click();">Clear Filters</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{layout :: footer}"></footer>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const productCols = Array.from(document.querySelectorAll('.product-card-col'));
            const productsGrid = document.getElementById('productsGrid');
            const countDisplay = document.getElementById('items-found-count');
            const noResultsMsg = document.getElementById('noResultsMsg');
            
            // Inputs
            const searchInput = document.getElementById('searchInput');
            const categoryRadios = document.querySelectorAll('.filter-category');
            const priceRange = document.getElementById('priceRange');
            const priceVal = document.getElementById('priceVal');
            const sortSelect = document.getElementById('sortSelect');
            const brandFilterContainer = document.getElementById('brandFilterContainer');
            const resetFiltersBtn = document.getElementById('resetFilters');

            // 1. Populate Brand Checkboxes Dynamically based on existing DOM data
            const brands = new Set();
            productCols.forEach(col => {
                let b = col.getAttribute('data-brand');
                if (b) brands.add(b);
            });
            
            Array.from(brands).sort().forEach(brand => {
                const id = 'brand_' + brand.replace(/\s+/g, '_');
                const html = `
                    <div class="form-check">
                        <input class="form-check-input filter-brand" type="checkbox" value="${brand}" id="${id}">
                        <label class="form-check-label" for="${id}">${brand}</label>
                    </div>
                `;
                brandFilterContainer.insertAdjacentHTML('beforeend', html);
            });
            const brandCheckboxes = document.querySelectorAll('.filter-brand');

            // 2. Preselect category if passed in URL (e.g., from Dashboard view more button)
            const urlPath = window.location.pathname;
            if(urlPath.includes('/shop/category/')) {
                const catId = urlPath.split('/').pop();
                const targetRadio = document.getElementById('cat_' + catId);
                if(targetRadio) targetRadio.checked = true;
            }

            // Main Apply Filter Logic
            function applyFilters() {
                const query = searchInput.value.toLowerCase().trim();
                const maxPrice = parseFloat(priceRange.value);
                
                // Get selected category
                let activeCategory = 'all';
                categoryRadios.forEach(r => { if(r.checked) activeCategory = r.value; });
                
                // Get selected brands
                const activeBrands = Array.from(brandCheckboxes)
                                          .filter(cb => cb.checked)
                                          .map(cb => cb.value);

                let visibleCount = 0;
                let visibleElements = [];

                productCols.forEach(col => {
                    const price = parseFloat(col.getAttribute('data-price'));
                    const catId = col.getAttribute('data-category-id');
                    const brand = col.getAttribute('data-brand');
                    const name = col.getAttribute('data-name');

                    let matchCategory = (activeCategory === 'all' || catId === activeCategory);
                    let matchBrand = (activeBrands.length === 0 || activeBrands.includes(brand));
                    let matchPrice = (price <= maxPrice);
                    let matchSearch = (name.includes(query) || brand.toLowerCase().includes(query));

                    if (matchCategory && matchBrand && matchPrice && matchSearch) {
                        visibleElements.push(col);
                        visibleCount++;
                    } else {
                        col.style.display = 'none';
                    }
                });

                // Apply Sorting
                const sortType = sortSelect.value;
                if (sortType !== 'default') {
                    visibleElements.sort((a, b) => {
                        if (sortType === 'price_asc') {
                            return parseFloat(a.getAttribute('data-price')) - parseFloat(b.getAttribute('data-price'));
                        } else if (sortType === 'price_desc') {
                            return parseFloat(b.getAttribute('data-price')) - parseFloat(a.getAttribute('data-price'));
                        } else if (sortType === 'name_asc') {
                            return a.getAttribute('data-name').localeCompare(b.getAttribute('data-name'));
                        }
                    });
                } else {
                    // Reset to DOM order roughly (re-append in original order)
                    visibleElements.sort((a, b) => {
                        return productCols.indexOf(a) - productCols.indexOf(b);
                    });
                }

                // Render visible elements in sorted order
                visibleElements.forEach(col => {
                    col.style.display = 'block';
                    productsGrid.appendChild(col); // Moves to end, effectively sorting them
                });

                // Update UI Feedback
                countDisplay.innerText = visibleCount + ' Items found';
                if (visibleCount === 0) {
                    noResultsMsg.classList.remove('d-none');
                } else {
                    noResultsMsg.classList.add('d-none');
                }
            }

            // Event Listeners
            searchInput.addEventListener('input', applyFilters);
            categoryRadios.forEach(r => r.addEventListener('change', applyFilters));
            brandCheckboxes.forEach(cb => cb.addEventListener('change', applyFilters));
            sortSelect.addEventListener('change', applyFilters);
            priceRange.addEventListener('input', function() {
                priceVal.innerText = 'Rs. ' + this.value;
                applyFilters();
            });

            // Reset
            resetFiltersBtn.addEventListener('click', function() {
                searchInput.value = '';
                document.getElementById('cat_all').checked = true;
                brandCheckboxes.forEach(cb => cb.checked = false);
                priceRange.value = 100000;
                priceVal.innerText = 'Rs. 100000';
                sortSelect.value = 'default';
                applyFilters();
            });

            // Initial Run to satisfy URL category preset if present
            applyFilters();
        });
    </script>
</body>
</html>
