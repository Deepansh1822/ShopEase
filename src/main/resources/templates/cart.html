<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
    <nav th:replace="~{layout :: nav}"></nav>

    <div class="content-wrapper">
        <div class="container">
            <h2 class="mb-4">Your Shopping Cart</h2>
            <div class="row" th:if="${not #lists.isEmpty(cart)}">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-4">
                        <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold m-0"><i class="fas fa-shopping-cart text-accent me-2"></i>Cart Items</h5>
                            <span class="badge bg-dark rounded-pill px-3 py-2" th:text="${cart.size()} + ' Items'">0 Items</span>
                        </div>
                        <div class="card-body p-0">
                            <div class="row align-items-center p-4 border-bottom position-relative" th:each="item : ${cart}">
                                <div class="col-3 col-md-2">
                                    <div class="ratio ratio-1x1 rounded-3 overflow-hidden shadow-sm">
                                        <img th:src="@{'/img/' + ${item.product.imageName}}" class="object-fit-cover" alt="Product">
                                    </div>
                                </div>
                                <div class="col-9 col-md-4">
                                    <h5 class="mb-1 fw-bold text-dark" th:text="${item.product.name}">Product Name</h5>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge bg-secondary bg-opacity-10 text-secondary" th:text="${item.product.category.name}">Category</span>
                                        <span class="badge bg-primary bg-opacity-10 text-primary" th:if="${item.product.brand != null}" th:text="${item.product.brand}">Brand</span>
                                    </div>
                                </div>
                                <div class="col-4 col-md-2 mt-3 mt-md-0 text-md-center">
                                    <div class="bg-light rounded-pill px-3 py-1 d-inline-block border">
                                        <span class="text-muted small fw-bold me-1">Qty:</span>
                                        <span class="fw-bold" th:text="${item.quantity}">1</span>
                                    </div>
                                </div>
                                <div class="col-5 col-md-3 mt-3 mt-md-0 text-end">
                                    <span class="text-muted small d-block">Price</span>
                                    <span class="h5 fw-bold m-0 text-dark" th:text="'Rs. ' + ${item.product.price * item.quantity}">Price</span>
                                </div>
                                <div class="col-3 col-md-1 mt-3 mt-md-0 text-end">
                                    <a th:href="@{/cart/removeItem/{id}(id=${item.product.id})}" class="btn btn-outline-danger rounded-circle p-2" title="Remove Item">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card p-4 border-0 shadow-sm rounded-4">
                        <h4 class="fw-bold mb-4">Order Summary</h4>
                        
                        <!-- Promo Messages -->
                        <div th:if="${successMsg}" class="alert alert-success py-2 small" th:text="${successMsg}"></div>
                        <div th:if="${errorMsg}" class="alert alert-danger py-2 small" th:text="${errorMsg}"></div>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Subtotal</span>
                            <span class="fw-bold" th:text="'Rs. ' + ${subtotal}">0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-success" th:if="${discountAmount > 0}">
                            <span>Discount (<span th:text="${appliedPromo}"></span>)</span>
                            <span class="fw-bold">- Rs. <span th:text="${discountAmount}"></span></span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Delivery Fee</span>
                            <span class="fw-bold" th:if="${deliveryFee > 0}" th:text="'+ Rs. ' + ${deliveryFee}">0.00</span>
                            <span class="fw-bold text-success" th:if="${deliveryFee == 0}">FREE</span>
                        </div>
                        
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold">Total Amount</span>
                            <span class="h4 fw-bold text-dark" th:text="'Rs. ' + ${total}">0.00</span>
                        </div>

                        <!-- Apply Promo Form -->
                        <form th:action="@{/cart/applyPromo}" method="post" class="mb-4" th:if="${appliedPromo == null}">
                            <label class="form-label small fw-bold text-muted text-uppercase">Have a promo code?</label>
                            <div class="input-group">
                                <input type="text" name="promoCode" class="form-control" placeholder="Enter code" required>
                                <button type="submit" class="btn btn-dark">Apply</button>
                            </div>
                        </form>
                        
                        <!-- Remove Promo btn -->
                        <div class="mb-4" th:if="${appliedPromo != null}">
                            <a th:href="@{/cart/removePromo}" class="btn btn-outline-danger btn-sm w-100 rounded-pill">Remove Promo Code</a>
                        </div>

                        <a th:href="@{/checkout}" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm">Proceed to Checkout</a>
                    </div>
                </div>
            </div>
            <div class="text-center py-5" th:unless="${not #lists.isEmpty(cart)}">
                <i class="fas fa-shopping-basket fa-4x text-light mb-3"></i>
                <h3>Your cart is empty</h3>
                <a th:href="@{/shop}" class="btn btn-primary mt-3">Start Shopping</a>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
